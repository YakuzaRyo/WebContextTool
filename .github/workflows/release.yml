name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wctx
          - name: linux-i686
            runner: ubuntu-latest
            target: i686-unknown-linux-gnu
            binary: wctx
          # macOS
          - name: macos-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            binary: wctx
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: wctx
          # Windows
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wctx.exe
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            binary: wctx.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.platform.target }}

      - name: Install cross compile dependencies (Linux i686)
        if: matrix.platform.name == 'linux-i686'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-i686-linux-gnu

      - name: Set cross compile env (Linux i686)
        if: matrix.platform.name == 'linux-i686'
        run: |
          echo "CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER=i686-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Strip binary (Linux/macOS)
        if: "!startsWith(matrix.platform.name, 'windows-')"
        run: strip target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}

      - name: Create checksums
        run: |
          sha256sum target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }} > sha256_${{ matrix.platform.name }}.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: |
            target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}
            sha256_${{ matrix.platform.name }}.txt

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Changes
            Automated release build for multiple platforms
          files: |
            artifacts/**/wctx
            artifacts/**/wctx.exe
            artifacts/**/sha256*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
